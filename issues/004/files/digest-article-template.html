<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[文章标题] | AI Digest #[期号]</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --white: #FFFFFF;
    --iris-light: #F4F3F1;
    --iris: #E8E6E1;
    --grey: #807D76;
    --grey-mid: #605D56;
    --text: #2C2B28;
    --text-body: #3A3935;
    --text-light: #706D66;
    --teal: #2A9D8F;
    --teal-dark: #1E7A6F;
    --black: #1A1918;
  }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--text-body);
    line-height: 2;
    font-size: 15px;
    background: var(--white);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 660px; margin: 0 auto; padding: 40px 28px 72px; }
  .nav-back {
    font-size: 13px; color: var(--teal); text-decoration: none; font-weight: 400;
    letter-spacing: 0.3px;
  }
  .nav-back:hover { color: var(--teal-dark); }

  /* ── Header ── */
  .header { margin: 48px 0 40px; }
  .header-brand {
    font-size: 10px; letter-spacing: 4px; color: var(--grey);
    text-transform: uppercase; margin-bottom: 20px;
  }
  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px; font-weight: 700; color: var(--black);
    line-height: 1.25; margin-bottom: 16px;
  }
  .header-sub {
    font-size: 15px; color: var(--grey-mid); line-height: 1.7; font-weight: 300;
  }
  .header-meta {
    font-size: 11px; color: var(--grey); margin-top: 20px; letter-spacing: 0.5px;
  }
  .header-line { width: 40px; height: 2px; background: var(--teal); margin-top: 28px; }

  /* ── Section divider: thin line + teal dot ── */
  .divider {
    display: flex; align-items: center; gap: 16px; margin: 44px 0 36px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--iris);
  }
  .divider .dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--teal); flex-shrink: 0;
  }

  /* ── Section heading ── */
  .section-head { margin-bottom: 20px; }
  .section-label {
    font-size: 11px; font-weight: 500; color: var(--teal);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 700; color: var(--black); line-height: 1.3;
  }
  .section-note {
    font-size: 13px; color: var(--text-light); margin-top: 4px; font-weight: 300;
  }

  /* ── Body ── */
  p { margin-bottom: 16px; }
  strong { color: var(--text); font-weight: 600; }

  /* ── Scene block: left grey bar indent ── */
  .scene {
    border-left: 2px solid var(--iris);
    padding-left: 20px;
    margin: 20px 0 24px;
    color: var(--text-body);
    font-size: 14px;
    line-height: 2;
  }
  .scene p { margin-bottom: 10px; }
  .scene p:last-child { margin-bottom: 0; }

  /* ── Tip: thin lines top/bottom + teal dot ── */
  .tip {
    font-size: 14px; color: var(--grey-mid);
    padding: 16px 0;
    border-top: 1px solid var(--iris);
    border-bottom: 1px solid var(--iris);
    margin: 24px 0;
  }
  .tip .tip-mark {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--teal); margin-right: 10px; vertical-align: middle;
    position: relative; top: -1px;
  }

  /* ── Progression pills (optional) ── */
  .progression {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin: 32px 0; flex-wrap: wrap;
  }
  .progression .step {
    font-size: 12px; font-weight: 500; color: var(--text);
    padding: 6px 14px; border: 1px solid var(--iris); border-radius: 20px; background: var(--white);
  }
  .progression .step.active { border-color: var(--teal); color: var(--teal); }
  .progression .arrow { color: var(--grey); font-size: 13px; }

  /* ── Summary list (optional) ── */
  .summary-item { padding: 12px 0; border-bottom: 1px solid var(--iris); }
  .summary-item:last-child { border-bottom: none; }
  .summary-item .name { font-weight: 600; color: var(--black); font-size: 15px; }
  .summary-item .desc { font-size: 14px; color: var(--grey-mid); margin-top: 2px; }
  .summary-item .who {
    font-size: 11px; color: var(--teal); font-weight: 500;
    letter-spacing: 0.5px; margin-top: 4px;
  }

  /* ── Closing ── */
  .closing {
    text-align: center; margin-top: 56px; padding-top: 32px;
    border-top: 1px solid var(--iris);
  }
  .closing p { font-size: 14px; color: var(--text-light); margin-bottom: 4px; font-weight: 300; }
  .closing .brand {
    font-size: 10px; letter-spacing: 4px; color: var(--grey);
    text-transform: uppercase; margin-top: 20px;
  }
  .closing a { color: var(--teal); text-decoration: none; font-size: 13px; }

  @media(max-width:640px){
    .wrap { padding: 28px 20px 56px; }
    .header-title { font-size: 27px; }
    .section-title { font-size: 21px; }
  }

  /* ── Dark mode ── */
  @media(prefers-color-scheme:dark){
    :root {
      --white: #1A1A1E;
      --iris-light: #2A2A2E;
      --iris: #333338;
      --grey: #6A6A70;
      --grey-mid: #8A8A90;
      --text: #E8E6E1;
      --text-body: #C5C3BE;
      --text-light: #7A7A80;
      --teal: #3DBDB0;
      --teal-dark: #5AD4C7;
      --black: #F0EEEA;
    }
    body { background: #141416; }
    .progression .step { background: #1A1A1E; }
    .scene { border-left-color: #444448; }
  }
</style>
</head>
<body>
<div class="wrap">

  <a href="index.html" class="nav-back">← 回到首页</a>

  <!-- ═══ HEADER ═══ -->
  <div class="header">
    <div class="header-brand">AI Digest by Syneira</div>
    <h1 class="header-title">[主标题]<br>[可选副标题行]</h1>
    <div class="header-sub">[一句话描述]</div>
    <div class="header-meta">Issue #[期号] · [月份 年份]</div>
    <div class="header-line"></div>
  </div>

  <!-- ═══ INTRO ═══ -->
  <p>[开篇段落，建立语境]</p>
  <p>[引出文章结构或核心论点]</p>

  <!-- ═══ OPTIONAL: progression pills ═══ -->

  </div>
  -->

  <!-- ═══ SECTION ═══ -->
  <div class="divider"><span class="dot"></span></div>

  <div class="section-head">
    <div class="section-label">[小标签，如：第一层 / 工具上新 / 趋势信号]</div>
    <div class="section-title">[章节标题]</div>
    <div class="section-note">[可选：一句补充说明]</div>
  </div>

  <p>[正文段落]</p>
  <p>[正文段落]</p>

  <!-- 场景/引用块 -->
  <div class="scene">
    <p>[场景或引用内容]</p>
    <p>[场景或引用内容]</p>
  </div>

  <!-- 提示 -->
  <div class="tip">
    <span class="tip-mark"></span>[提示内容]
  </div>

  <!-- ═══ 更多 SECTION 按需复制上面的结构 ═══ -->

  <!-- ═══ OPTIONAL: summary list ═══ -->
  <!--
  <div class="divider"><span class="dot"></span></div>
  <div class="section-head">
    <div class="section-title">[总结标题]</div>
  </div>
  <div class="summary-item">
    <div class="name">[名称]</div>
    <div class="desc">[一句话描述]</div>
    <div class="who">[适合谁]</div>
  </div>
  -->

  <!-- ═══ CLOSING ═══ -->
  <div class="closing">
    <p>源于生活，立足应用。</p>
    <p style="font-size:12px;color:var(--grey);">实用 > 炫酷 · 能用 > 能看</p>
    <p style="margin-top:16px;"><a href="index.html">← 查看往期 Digest</a></p>
    <div class="brand">AI Digest by Syneira</div>
  </div>

</div>
</body>
</html>
